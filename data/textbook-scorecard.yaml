    met: true
    accepted_at: '2026-07-21'
    accepted_head: 0032dc01ebba75c2caabc45ac70e013dafc7f643
    critic: fresh-context-governance-only
    critic_verdict: PASS
    checklist:
    - id: required_docs_exist
      ok: true
      detail: couple-profile, research method/rubric/copyright, sources, coverage, gap audits, visual candidates, website
        benchmark, loop, scorecard, roadmap, claim map, recount script
    - id: source_counts_recomputable
      ok: true
      detail: npm run check:research-registry (+ python twin); fails on integrity errors
    - id: no_category_padding
      ok: true
      detail: unique primary_category; benchmarks not counted as travel factual depth
    - id: freshness_semantics_correct
      ok: true
      detail: freshness_basis_type model; current only with typed dated/operator/provider basis + valid dates; formal negative
        fixtures in test:research-registry
    - id: top3_gaps_have_claim_map
      ok: true
      detail: role-split claim map (supporting/discovery/blocked/contradicting/missing)
    - id: scope_not_expanded
      ok: true
      detail: no itinerary/site/PDF/media product changes in governance fixes
    - id: independent_ai_review_no_governance_blocker
      ok: true
      detail: fresh-context governance critic PASS on 0032dc0; CI green with registry + freshness fixture gates
    notes: 'Round 1 Acceptance is a research-governance gate. It does not require Textbook Final Exit 90.

      '
  round_2_slice_exit:
    name: Round 2 Slice Exit
    applies_to_each_pr: true
    requires_overall_90: false
    each_slice_must_include:
    - research_evidence
    - personalized_rationale
    - one_or_more_functional_diagrams
    - independent_critic
    - no_self_merge
    planned_slices:
