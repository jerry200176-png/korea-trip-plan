milestones:
  - id: t-180
    label: T-180
    tasks:
      - id: t180-passport
        title: 確認兩人護照效期（通常建議效期覆蓋行程後至少 6 個月——以航空／入境官方為準）
        done: false
      - id: t180-dates
        title: 鎖定旅行日期（D1）
        done: true
      - id: t180-route
        title: 鎖定城市與夜數（D2）
        done: true
  - id: t-120
    label: T-120
    tasks:
      - id: t120-airports
        title: 查票驗證機場方案（D3 目標 open-jaw）
        done: false
      - id: t120-flight-shortlist
        title: 建立航班比較表（D3-B≥3 組、D3-A≥2 組；含行李總價／時刻／退改；尚未購票）
        done: false
      - id: t120-keta-watch
        title: 查核 K-ETA／免簽最新規定（官方）
        done: false
  - id: t-90
    label: T-90
    tasks:
      - id: t90-insurance-research
        title: 旅遊保險方案比較（官網條款）
        done: false
      - id: t90-lodging-areas
        title: 每城最多 3 間住宿 shortlist（鍾路／仁寺洞 vs 海雲台；可免費取消）
        done: false
      - id: t90-crustacean-class
        title: 確認甲殼類是偏好還是過敏（含交叉接觸底線）
        done: false
      - id: t90-passport-photo
        title: 確認護照效期與證件照備份
        done: false
      - id: t90-card-notices
        title: 讀台新／富邦等卡海外交易最新說明（不寫死回饋％）
        done: false
  - id: t-60
    label: T-60
    tasks:
      - id: t60-book-flights
        title: 購票（我們執行；確認碼勿貼公開版）
        done: false
      - id: t60-book-hotels
        title: 訂房（我們執行；確認碼勿貼公開版）
        done: false
      - id: t60-hanbok-slot
        title: T-45～T-30 鎖定韓服可取消時段（主要行程）
        done: false
      - id: t60-experiences
        title: 算命僅在條件滿足時再調查；否則維持可選刪除
        done: false
  - id: t-30
    label: T-30
    tasks:
      - id: t30-reverify-places
        title: 重查所有正式行程地點營業資訊
        done: false
      - id: t30-sim
        title: 決定 eSIM／SIM／Wi-Fi；兩支手機都測試
        done: false
      - id: t30-ktx
        title: 若採雙城，規劃 KTX 車次（日期未定前僅規劃）
        done: false
      - id: t30-luggage-size
        title: 依航空公司規則決定登機／托運尺寸
        done: false
  - id: t-14
    label: T-14
    tasks:
      - id: t14-fx
        title: 換匯／信用卡海外交易設定（查銀行官網）
        done: false
      - id: t14-packing-draft
        title: 行李清單初稿（七天層次＋雨備）
        done: false
      - id: t14-hanbok-fortune
        title: 確認韓服預約條款；算命僅在條件滿足時再確認，否則維持刪除
        done: false
      - id: t14-instant-camera
        title: 拍立得底片與電池備妥
        done: false
  - id: t-7
    label: T-7
    tasks:
      - id: t7-final-hours
        title: 最終確認營業時間、天氣、交通、預約
        done: false
      - id: t7-pdfs
        title: 更新手冊與 PDF，存入兩人手機
        done: false
      - id: t7-offline-emergency
        title: 填入住宿韓文地址占位→真實地址（僅離線）
        done: false
      - id: t7-powerbank
        title: 再查航空公司行動電源規則
        done: false
  - id: t-3
    label: T-3
    tasks:
      - id: t3-pack
        title: 完成打包與液體／電池檢查
        done: false
      - id: t3-cash
        title: 準備少量韓元現金緩衝
        done: false
  - id: t-1
    label: T-1
    tasks:
      - id: t1-docs
        title: 護照、保險、離線地圖、緊急包 PDF
        done: false
      - id: t1-phones
        title: 兩支手機充滿電；離線檔案可開
        done: false
  - id: departure
    label: 出發日
    tasks:
      - id: dep-buffer
        title: 依航空公司建議提早到機場
        done: false
  - id: return
    label: 回國後
    tasks:
      - id: ret-notes
        title: 回填實際花費與值得／不值得的店（更新 YAML）
        done: false
      - id: ret-film
        title: 拍立得底片保存與數位備份
        done: false
