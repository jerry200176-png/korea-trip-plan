    nikita_relevance: Scenery/photo value if timed well.
    notes: A1 operator page supports existence/course identity; A2/editorial are discovery. March ops still unconfirmed.

  - claim_id: clm-day6-low-energy-variant-missing
    claim: Day 6 currently risks an over-touristy Haeundae + Gwangalli postcard day; a documented low-energy beach-walk variant with named backups is not yet evidenced as a product slice.
    supporting_source_ids: []
    discovery_source_ids: [rs-032, rs-030, rs-060, rs-039, rs-009]
    blocked_source_ids: []
    contradicting_source_ids: []
