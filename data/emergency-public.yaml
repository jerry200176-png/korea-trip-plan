transport_rescue:
  note: 交通教材救援摘要；完整流程見網站交通頁
  first_moves:
    - 搭錯方向／坐過站：下一站下車再反向
    - 餘額不足：便利商店或車站儲值
    - 沒網路：改用離線截圖與夥伴手機
    - 末班已過：計程車 Rescue，勿在不安全處過夜
    - 兩人走散：留在最後約定點，必要時打 112
  hard_stop_examples:
    - 護照或重要文件遺失
    - 行李遺失且含重要物品需報案／航空公司櫃台
    - 國際航班誤接且無法自行改票
