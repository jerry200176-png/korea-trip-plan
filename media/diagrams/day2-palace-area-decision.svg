<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640"><rect width="1200" height="640" fill="#eef2f7"/><text x="40" y="48" font-family="Noto Sans TC,sans-serif" font-size="28" font-weight="700">宮殿後區域決策（Compare）</text><rect x="40" y="100" width="360" height="400" rx="8" fill="#fff" stroke="#2f5d3a" stroke-width="2"/><text x="60" y="150" font-family="Noto Sans TC,sans-serif" font-size="20" font-weight="700" fill="#2f5d3a">北村 Retain</text><text x="60" y="200" font-family="Noto Sans TC,sans-serif" font-size="15">韓屋合照價值最高</text><text x="60" y="235" font-family="Noto Sans TC,sans-serif" font-size="15">有坡、要安靜</text><text x="60" y="270" font-family="Noto Sans TC,sans-serif" font-size="15">Core 可縮短</text><rect x="420" y="100" width="360" height="400" rx="8" fill="#fff" stroke="#2c2416" stroke-width="2"/><text x="440" y="150" font-family="Noto Sans TC,sans-serif" font-size="20" font-weight="700">仁寺洞 Optional</text><text x="440" y="200" font-family="Noto Sans TC,sans-serif" font-size="15">文創／茶館輕走</text><text x="440" y="235" font-family="Noto Sans TC,sans-serif" font-size="15">體力夠再加</text><rect x="800" y="100" width="360" height="400" rx="8" fill="#fff" stroke="#8a3b2a" stroke-width="2"/><text x="820" y="150" font-family="Noto Sans TC,sans-serif" font-size="20" font-weight="700" fill="#8a3b2a">益善洞 Optional</text><text x="820" y="200" font-family="Noto Sans TC,sans-serif" font-size="15">咖啡拍照</text><text x="820" y="235" font-family="Noto Sans TC,sans-serif" font-size="15">低體力可跳過</text><text x="40" y="560" font-family="Noto Sans TC,sans-serif" font-size="16">Core：韓服 → 景福宮 → 北村短走 → 休息。不預設三區全跑。</text></svg>