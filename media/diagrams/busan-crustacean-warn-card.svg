<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img">
  <rect width="1200" height="560" fill="#fff5f2"/>
  <text x="48" y="50" font-family="Noto Sans TC, sans-serif" font-size="28" font-weight="700" fill="#8a3b2a">甲殼類／配料提醒（Warn）</text>
  <text x="48" y="84" font-family="Noto Sans TC, sans-serif" font-size="14" fill="#6a5d4a">Nikita／Jerry 約束：不吃甲殼類主打；無法證明「完全無」就當場問</text>
  <rect x="48" y="120" width="1104" height="380" rx="8" fill="#fff" stroke="#8a3b2a" stroke-width="2"/>
  <text x="80" y="170" font-family="Noto Sans TC, sans-serif" font-size="18" font-weight="700">常見風險</text>
  <text x="80" y="210" font-family="Noto Sans TC, sans-serif" font-size="16">1. 새우젓（蝦醬）— 湯飯常見調味</text>
  <text x="80" y="245" font-family="Noto Sans TC, sans-serif" font-size="16">2. 海鮮煎餅／蝦／蟹小菜誤上桌</text>
  <text x="80" y="280" font-family="Noto Sans TC, sans-serif" font-size="16">3. 市場／海邊店「綜合海鮮」套餐</text>
  <text x="80" y="330" font-family="Noto Sans TC, sans-serif" font-size="18" font-weight="700">現場句子</text>
  <text x="80" y="370" font-family="Noto Sans TC, sans-serif" font-size="16">「새우젓 빼주세요」(請不要蝦醬)</text>
  <text x="80" y="405" font-family="Noto Sans TC, sans-serif" font-size="16">「해산물 알레르기 있어요」(我對海鮮敏感／不吃)</text>
  <text x="80" y="450" font-family="Noto Sans TC, sans-serif" font-size="15" fill="#6a5d4a">Anmok 有編輯訊號「可不加蝦醬」— 仍要現場確認，不可寫成保證。</text>
</svg>