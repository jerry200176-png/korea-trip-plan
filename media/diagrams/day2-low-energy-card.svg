<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520"><rect width="1200" height="520" fill="#f3f7f2"/><text x="40" y="48" font-family="Noto Sans TC,sans-serif" font-size="28" font-weight="700">Day 2 低體力刪減（Explain）</text><rect x="40" y="90" width="1120" height="380" rx="8" fill="#fff" stroke="#2f5d3a" stroke-width="2"/><text x="70" y="150" font-family="Noto Sans TC,sans-serif" font-size="18">1 選最近韓服店（少轉乘）</text><text x="70" y="195" font-family="Noto Sans TC,sans-serif" font-size="18">2 景福宮只留重點合照區</text><text x="70" y="240" font-family="Noto Sans TC,sans-serif" font-size="18">3 刪北村長坡／只留一個觀景點</text><text x="70" y="285" font-family="Noto Sans TC,sans-serif" font-size="18">4 跳過仁寺洞／益善洞</text><text x="70" y="330" font-family="Noto Sans TC,sans-serif" font-size="18">5 提早歸還韓服＋休息</text><text x="70" y="390" font-family="Noto Sans TC,sans-serif" font-size="16" fill="#6a5d4a">雨天：縮短戶外，改室內休息；仍可保留韓服合照價值。</text></svg>