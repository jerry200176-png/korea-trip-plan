name: CI

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:

jobs:
  foundation-exit-gate:
    runs-on: ubuntu-latest
    outputs:
      artifact_sha: ${{ steps.meta.outputs.artifact_sha }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve artifact / verified head SHA
        id: meta
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            SHA="${{ github.event.pull_request.head.sha }}"
          else
            SHA="${{ github.sha }}"
          fi
          echo "artifact_sha=${SHA}" >> "$GITHUB_OUTPUT"
          mkdir -p dist
          printf '%s\n' "{
            \"event\": \"${{ github.event_name }}\",
            \"ci_verified_head_sha\": \"${SHA}\",
            \"github_sha\": \"${{ github.sha }}\",
            \"run_id\": \"${{ github.run_id }}\",
            \"workflow\": \"${{ github.workflow }}\",
            \"ref\": \"${{ github.ref }}\"
          }" > dist/ci-verified-head.json
          echo "Resolved ci_verified_head_sha=${SHA}"
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            site/package-lock.json
      - name: Clean install (reproducibility)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq poppler-utils
          npm ci
          npm ci --prefix site
          npx playwright install chromium
      - name: Foundation Exit Gate — npm run ci
        run: npm run ci
      - name: Upload handbook artifacts
        uses: actions/upload-artifact@v4
        with:
          name: handbook-dist-${{ steps.meta.outputs.artifact_sha }}
          path: |
            dist/
            site/dist/
            site/public/downloads/
          if-no-files-found: error

  pages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: foundation-exit-gate
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      actions: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download built site from gate
        uses: actions/download-artifact@v4
        with:
          name: handbook-dist-${{ needs.foundation-exit-gate.outputs.artifact_sha }}
          path: artifact
      - name: Stage Pages bundle with PDF downloads
        run: |
          set -euo pipefail
          ls -la artifact/site/dist | head
          test -f artifact/site/dist/index.html
          test -d artifact/site/dist/review
          mkdir -p artifact/site/dist/downloads
          cp -a artifact/site/public/downloads/. artifact/site/dist/downloads/
          test -f artifact/site/dist/downloads/korea-trip-handbook.pdf
          # Privacy already enforced in foundation-exit-gate (check:public-preview-privacy).
          echo "public-preview-privacy: inherited PASS from foundation-exit-gate"
          if [ -f artifact/dist/ci-verified-head.json ]; then
            echo "ci-verified-head:"
            cat artifact/dist/ci-verified-head.json
          fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: artifact/site/dist
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
