name: CI

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:

jobs:
  foundation-exit-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            site/package-lock.json
      - name: Clean install (reproducibility)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq poppler-utils
          npm ci
          npm ci --prefix site
          npx playwright install chromium
      - name: Foundation Exit Gate — npm run ci
        run: npm run ci
      - name: Upload handbook artifacts
        uses: actions/upload-artifact@v4
        with:
          name: handbook-dist-${{ github.sha }}
          path: |
            dist/
            site/dist/
            site/public/downloads/
          if-no-files-found: error

  pages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: foundation-exit-gate
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download built site from gate
        uses: actions/download-artifact@v4
        with:
          name: handbook-dist-${{ github.sha }}
          path: artifact
      - name: Public privacy gate on deploy artifact
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq poppler-utils
          npm ci
          # Point scanners at downloaded artifact layout
          mkdir -p dist site/dist site/public/downloads
          cp -a artifact/dist/. dist/ || true
          cp -a artifact/site/dist/. site/dist/
          cp -a artifact/site/public/downloads/. site/public/downloads/ || true
          npm run check:public-preview-privacy
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
