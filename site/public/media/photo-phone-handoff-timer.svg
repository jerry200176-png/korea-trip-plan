<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Phone handoff and timer flow</title>
  <desc id="desc">Explain how to hand phone to stranger or use timer for couple photos.</desc>
  <defs><style>
      .bg { fill: #f7f4ed; }
      .card { fill: #fffdf8; stroke: #2c2416; stroke-width: 2; }
      .card-ok { fill: #f3f7f2; stroke: #2f5d3a; stroke-width: 2; }
      .card-bad { fill: #fff5f2; stroke: #8a3b2a; stroke-width: 2; }
      .card-warm { fill: #f7f0e4; stroke: #8a6a2a; stroke-width: 2; }
      .title { font-family: "Noto Sans TC", "Noto Sans KR", "DejaVu Sans", sans-serif; font-size: 28px; font-weight: 700; fill: #2c2416; }
      .h { font-family: "Noto Sans TC", "Noto Sans KR", "DejaVu Sans", sans-serif; font-size: 16px; font-weight: 700; fill: #2c2416; }
      .t { font-family: "Noto Sans TC", "Noto Sans KR", "DejaVu Sans", sans-serif; font-size: 14px; fill: #3a3124; }
      .muted { font-family: "Noto Sans TC", "Noto Sans KR", "DejaVu Sans", sans-serif; font-size: 12px; fill: #6a5d4a; }
      .tag { font-family: "Noto Sans TC", "DejaVu Sans", sans-serif; font-size: 12px; font-weight: 700; fill: #fffdf8; }
      .warn { font-family: "Noto Sans TC", "Noto Sans KR", "DejaVu Sans", sans-serif; font-size: 15px; font-weight: 700; fill: #8a3b2a; }
      .frame { fill: none; stroke: #2c2416; stroke-width: 3; stroke-dasharray: 8 6; }
</style></defs>
  <rect class="bg" width="1200" height="720"/>
  <text class="title" x="48" y="44">手機交接／倒數（Explain）</text>
  <text class="muted" x="48" y="68">iPhone 14（Jerry）· iPhone 17 Pro（Nikita）· 拍立得另計 · 2026-07-21</text>

  <rect class="card" x="40" y="100" width="360" height="280" rx="8"/>
  <rect x="56" y="116" width="64" height="24" rx="4" fill="#2f5d3a"/>
  <text class="tag" x="70" y="133">1</text>
  <text class="h" x="56" y="175">先鎖定畫面</text>
  <text class="t" x="56" y="215">開啟相機 → 直式或橫式</text>
  <text class="t" x="56" y="250">點一下對焦；可開倒數</text>
  <text class="t" x="56" y="285">夜景／遠景優先 17 Pro</text>
  <text class="muted" x="56" y="340">不比較誰比較好看</text>

  <rect class="card" x="420" y="100" width="360" height="280" rx="8"/>
  <rect x="436" y="116" width="64" height="24" rx="4" fill="#2f5d3a"/>
  <text class="tag" x="450" y="133">2</text>
  <text class="h" x="436" y="175">請路人／用腳架替代</text>
  <text class="t" x="436" y="215">短句：사진 한 장만 찍어 주세요</text>
  <text class="t" x="436" y="250">雙手遞出；說明按快門位置</text>
  <text class="t" x="436" y="285">或固定手機＋倒數兩人入鏡</text>
  <text class="muted" x="436" y="340">Day 2／Day 6 較常需要</text>

  <rect class="card" x="800" y="100" width="360" height="280" rx="8"/>
  <rect x="816" y="116" width="64" height="24" rx="4" fill="#2f5d3a"/>
  <text class="tag" x="830" y="133">3</text>
  <text class="h" x="816" y="175">收回檢查</text>
  <text class="t" x="816" y="215">看兩人是否入框</text>
  <text class="t" x="816" y="250">模糊就再拍一張</text>
  <text class="t" x="816" y="285">道謝：감사합니다</text>
  <text class="muted" x="816" y="340">不為完美重拍過久</text>

  <rect class="card-ok" x="40" y="400" width="1120" height="280" rx="8"/>
  <text class="h" x="56" y="450">裝置原則（Identify）</text>
  <text class="t" x="56" y="495">廣角／遠景／夜景：優先 Nikita iPhone 17 Pro</text>
  <text class="t" x="56" y="535">一般日光合照：兩支都行；誰手邊方便用誰</text>
  <text class="t" x="56" y="575">三月寒冷：手機貼身保溫；電量預留</text>
  <text class="t" x="56" y="615">不為拍照排長隊（Jerry：節奏優先）</text>
  <text class="muted" x="56" y="655">功能：Explain｜Identify｜Warn（排隊）</text>
</svg>
