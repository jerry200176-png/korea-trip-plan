<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780" role="img" aria-labelledby="title desc">
  <title id="title">Incheon arrival flow</title>
  <desc id="desc">TPE prep through ICN arrival to lodging: immigration, baggage, customs, SIM/cash/T-money.</desc>
  <defs>
    <style>
      .bg { fill: #f7f4ed; }
      .card { fill: #fffdf8; stroke: #2c2416; stroke-width: 2; }
      .card-ok { fill: #f3f7f2; stroke: #2f5d3a; stroke-width: 2; }
      .card-warn { fill: #fff5f2; stroke: #8a3b2a; stroke-width: 2; }
      .card-dep { fill: #f7f0e4; stroke: #8a6a2a; stroke-width: 2; }
      .title { font-family: "Noto Sans TC", "Noto Sans KR", "DejaVu Sans", sans-serif; font-size: 30px; font-weight: 700; fill: #2c2416; }
      .h { font-family: "Noto Sans TC", "Noto Sans KR", "DejaVu Sans", sans-serif; font-size: 16px; font-weight: 700; fill: #2c2416; }
      .t { font-family: "Noto Sans TC", "Noto Sans KR", "DejaVu Sans", sans-serif; font-size: 13px; fill: #3a3124; }
      .muted { font-family: "Noto Sans TC", "Noto Sans KR", "DejaVu Sans", sans-serif; font-size: 13px; fill: #6a5d4a; }
      .tag { font-family: "Noto Sans TC", "DejaVu Sans", sans-serif; font-size: 12px; font-weight: 700; fill: #fffdf8; }
    </style>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#2f5d3a"/></marker>
  </defs>
  <rect class="bg" width="1200" height="780"/>
  <text class="title" x="48" y="48">仁川入境動線（Orient／Explain）</text>
  <text class="muted" x="48" y="74">Jerry &amp; Nikita · Day 1 · 2026-07-21 · 功能：落地順序與依賴步驟</text>

  <rect class="card-dep" x="40" y="100" width="150" height="120" rx="8"/>
  <rect x="52" y="112" width="72" height="22" rx="4" fill="#8a6a2a"/>
  <text class="tag" x="60" y="128">D1 依賴</text>
  <text class="h" x="52" y="158">1 TPE 出發前</text>
  <text class="t" x="52" y="182">護照／證件／預約</text>
  <text class="t" x="52" y="202">登機證・行李額</text>

  <line x1="190" y1="160" x2="220" y2="160" stroke="#2f5d3a" stroke-width="2.5" marker-end="url(#arr)"/>

  <rect class="card" x="224" y="100" width="150" height="120" rx="8"/>
  <text class="h" x="236" y="140">2 ICN 下機</text>
  <text class="t" x="236" y="168">跟指標 → Arrival</text>
  <text class="t" x="236" y="192">勿急著找 Wi-Fi</text>

  <line x1="374" y1="160" x2="404" y2="160" stroke="#2f5d3a" stroke-width="2.5" marker-end="url(#arr)"/>

  <rect class="card" x="408" y="100" width="150" height="120" rx="8"/>
  <text class="h" x="420" y="140">3 入境審查</text>
  <text class="t" x="420" y="168">護照＋入境資格</text>
  <text class="t" x="420" y="192">跟官方動線排隊</text>

  <line x1="558" y1="160" x2="588" y2="160" stroke="#2f5d3a" stroke-width="2.5" marker-end="url(#arr)"/>

  <rect class="card" x="592" y="100" width="150" height="120" rx="8"/>
  <text class="h" x="604" y="140">4 領行李</text>
  <text class="t" x="604" y="168">看航班轉盤號</text>
  <text class="t" x="604" y="192">確認行李吊牌</text>

  <line x1="742" y1="160" x2="772" y2="160" stroke="#2f5d3a" stroke-width="2.5" marker-end="url(#arr)"/>

  <rect class="card" x="776" y="100" width="150" height="120" rx="8"/>
  <text class="h" x="788" y="140">5 海關</text>
  <text class="t" x="788" y="168">申報規則以現場</text>
  <text class="t" x="788" y="192">官方標示為準</text>

  <line x1="926" y1="160" x2="956" y2="160" stroke="#2f5d3a" stroke-width="2.5" marker-end="url(#arr)"/>

  <rect class="card-ok" x="960" y="100" width="200" height="120" rx="8"/>
  <text class="h" x="972" y="140">6 出境大廳</text>
  <text class="t" x="972" y="168">SIM／現金／T-money</text>
  <text class="t" x="972" y="192">再決定進城方式</text>

  <rect class="card" x="40" y="250" width="560" height="200" rx="8"/>
  <rect x="56" y="266" width="100" height="24" rx="4" fill="#2c2416"/>
  <text class="tag" x="68" y="283">落地補給</text>
  <text class="h" x="172" y="284">SIM／現金／T-money（可並行）</text>
  <text class="t" x="56" y="322">・網路：eSIM 若已裝好可跳過；否則買實體卡／租機 — 查官方</text>
  <text class="t" x="56" y="350">・現金：ATM／換錢櫃台；金額以當日需求為準，不鎖死數字</text>
  <text class="t" x="56" y="378">・T-money：便利店／販賣點購買與加值 — 細節以 t-money.co.kr 為準</text>
  <text class="muted" x="56" y="416">低體力：先搞定網路＋T-money，現金可稍後補</text>

  <rect class="card-ok" x="620" y="250" width="540" height="200" rx="8"/>
  <rect x="636" y="266" width="88" height="24" rx="4" fill="#2f5d3a"/>
  <text class="tag" x="648" y="283">下一步</text>
  <text class="h" x="740" y="284">7 前往住宿</text>
  <text class="t" x="636" y="322">選 AREX／機場巴士／計程車（見比較圖）</text>
  <text class="t" x="636" y="350">住宿區尚未鎖定 → 先確認地址韓文再出發</text>
  <text class="t" x="636" y="378">行李多／很累 → 直接 Taxi Rescue，不硬撐轉乘</text>
  <text class="muted" x="636" y="416">Naver Map 查出口與步行段 · 末班前到房</text>

  <rect class="card-warn" x="40" y="480" width="560" height="160" rx="8"/>
  <rect x="56" y="496" width="130" height="24" rx="4" fill="#8a3b2a"/>
  <text class="tag" x="68" y="513">航空／D1 依賴</text>
  <text class="h" x="200" y="514">這些步驟會隨航班變</text>
  <text class="t" x="56" y="550">・航廈／轉盤／入境隊列時長：依航空公司與抵達時段</text>
  <text class="t" x="56" y="578">・入境資格／K-ETA 等：出發前查官方，勿憑記憶</text>
  <text class="t" x="56" y="606">・接駁首班／末班：以機場官方當日資訊為準</text>

  <rect class="card-dep" x="620" y="480" width="540" height="160" rx="8"/>
  <rect x="636" y="496" width="100" height="24" rx="4" fill="#8a6a2a"/>
  <text class="tag" x="648" y="513">執行口訣</text>
  <text class="h" x="752" y="514">Jerry／Nikita</text>
  <text class="t" x="636" y="550">護照在手 → 跟指標 → 領行李 → 補給三件</text>
  <text class="t" x="636" y="578">→ 確認住宿韓文地址 → 再選交通工具</text>
  <text class="t" x="636" y="606">不要在海關前先找換錢／SIM 櫃台</text>

  <rect class="card" x="40" y="670" width="1120" height="80" rx="8"/>
  <text class="t" x="56" y="706">證據優先：Incheon Airport 官方動線＋航空公司報到建議＋T-money／Naver Map。本圖不寫死票價、不寫死航班時刻。</text>
  <text class="muted" x="56" y="732">Date Pending 航班未鎖 · Open Decision D3／住宿區 · 出發前 T-7 再查官方</text>
</svg>
