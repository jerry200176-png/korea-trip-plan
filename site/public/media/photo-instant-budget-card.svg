<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Instant camera daily budget card</title>
  <desc id="desc">Remember and Explain polaroid film budget across seven days.</desc>
  <defs><style>
      .bg { fill: #f7f4ed; }
      .card { fill: #fffdf8; stroke: #2c2416; stroke-width: 2; }
      .card-ok { fill: #f3f7f2; stroke: #2f5d3a; stroke-width: 2; }
      .card-bad { fill: #fff5f2; stroke: #8a3b2a; stroke-width: 2; }
      .card-warm { fill: #f7f0e4; stroke: #8a6a2a; stroke-width: 2; }
      .title { font-family: "Noto Sans TC", "Noto Sans KR", "DejaVu Sans", sans-serif; font-size: 28px; font-weight: 700; fill: #2c2416; }
      .h { font-family: "Noto Sans TC", "Noto Sans KR", "DejaVu Sans", sans-serif; font-size: 16px; font-weight: 700; fill: #2c2416; }
      .t { font-family: "Noto Sans TC", "Noto Sans KR", "DejaVu Sans", sans-serif; font-size: 14px; fill: #3a3124; }
      .muted { font-family: "Noto Sans TC", "Noto Sans KR", "DejaVu Sans", sans-serif; font-size: 12px; fill: #6a5d4a; }
      .tag { font-family: "Noto Sans TC", "DejaVu Sans", sans-serif; font-size: 12px; font-weight: 700; fill: #fffdf8; }
      .warn { font-family: "Noto Sans TC", "Noto Sans KR", "DejaVu Sans", sans-serif; font-size: 15px; font-weight: 700; fill: #8a3b2a; }
      .frame { fill: none; stroke: #2c2416; stroke-width: 3; stroke-dasharray: 8 6; }
</style></defs>
  <rect class="bg" width="1200" height="720"/>
  <text class="title" x="48" y="44">拍立得每日預算（Explain／Remember）</text>
  <text class="muted" x="48" y="68">底片有限 · 三月保溫 · 2026-07-21 · 非裝飾相簿</text>

  <rect class="card-warm" x="40" y="100" width="1120" height="120" rx="8"/>
  <text class="h" x="56" y="145">原則：重要時刻才撕一張</text>
  <text class="t" x="56" y="180">建議預留 Day 2 韓服、Day 6 海岸、加 2–3 張彈性；其餘用手機</text>

  <rect class="card" x="40" y="240" width="160" height="200" rx="8"/><text class="h" x="56" y="280">D1</text><text class="t" x="56" y="320">可省</text><text class="muted" x="56" y="360">手機優先</text>
  <rect class="card-ok" x="210" y="240" width="160" height="200" rx="8"/><text class="h" x="226" y="280">D2</text><text class="t" x="226" y="320">優先</text><text class="muted" x="226" y="360">韓服 1–2</text>
  <rect class="card" x="380" y="240" width="160" height="200" rx="8"/><text class="h" x="396" y="280">D3</text><text class="t" x="396" y="320">可省</text><text class="muted" x="396" y="360">街景手機</text>
  <rect class="card" x="550" y="240" width="160" height="200" rx="8"/><text class="h" x="566" y="280">D4</text><text class="t" x="566" y="320">可省</text><text class="muted" x="566" y="360">休息日</text>
  <rect class="card" x="720" y="240" width="160" height="200" rx="8"/><text class="h" x="736" y="280">D5</text><text class="t" x="736" y="320">可省</text><text class="muted" x="736" y="360">車站一張手機</text>
  <rect class="card-ok" x="890" y="240" width="160" height="200" rx="8"/><text class="h" x="906" y="280">D6</text><text class="t" x="906" y="320">優先</text><text class="muted" x="906" y="360">海岸 1–2</text>
  <rect class="card" x="1040" y="240" width="120" height="200" rx="8"/><text class="h" x="1052" y="280">D7</text><text class="t" x="1052" y="320">彈性</text><text class="muted" x="1052" y="360">剩才用</text>

  <rect class="card-bad" x="40" y="460" width="1120" height="220" rx="8"/>
  <rect x="56" y="476" width="64" height="24" rx="4" fill="#8a3b2a"/>
  <text class="tag" x="70" y="493">Warn</text>
  <text class="warn" x="140" y="494">寒冷天氣：底片與電池貼身；勿長時間暴露在風裡</text>
  <text class="t" x="56" y="545">寫日期與地點在空白緣或背後（Remember）</text>
  <text class="t" x="56" y="585">不為拍立得排長隊；失敗一張就改手機</text>
  <text class="muted" x="56" y="635">功能：Explain｜Warn｜Remember · 非品牌廣告</text>
</svg>
